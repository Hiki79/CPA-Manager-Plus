services:
  cpa-manager-plus:
    image: ${CPAMP_IMAGE:-ghcr.io/hiki79/cpa-manager-plus:latest}
    restart: unless-stopped
    ports:
      - "${CPAMP_BIND_ADDRESS:-127.0.0.1}:${CPAMP_PORT:-18317}:18317"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HTTP_ADDR: "0.0.0.0:18317"
      USAGE_DB_PATH: "/data/usage.sqlite"
      CPA_MANAGER_DATA_KEY_PATH: "/data/data.key"
      USAGE_COLLECTOR_MODE: "auto"
      USAGE_RESP_QUEUE: "usage"
      USAGE_RESP_POP_SIDE: "right"
      USAGE_BATCH_SIZE: "100"
      USAGE_POLL_INTERVAL_MS: "500"
      USAGE_QUERY_LIMIT: "50000"
      USAGE_CORS_ORIGINS: "${CPAMP_CORS_ORIGINS:-http://127.0.0.1:18317}"
    volumes:
      - cpa-manager-plus-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18317/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  cpa-manager-plus-data:
